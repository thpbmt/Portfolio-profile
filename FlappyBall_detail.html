<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Ball</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #0f172a;
      overflow-x: hidden;
    }

    /* Background animation */
    .bg-animated {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(120deg,#0f172a,#1e293b,#1e3a8a,#0ea5e9);
      background-size: 300% 300%;
      animation: gradientMove 15s ease infinite;
    }

    .glow {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.4;
      animation: float 12s infinite ease-in-out;
    }

    .glow1 { background: #3b82f6; top: 10%; left: 10%; }
    .glow2 { background: #0ea5e9; bottom: 10%; right: 10%; animation-delay: 3s; }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes float {
      0%,100% { transform: translate(0,0); }
      50% { transform: translate(30px,-40px); }
    }

    /* Slider */
    .slider { overflow: hidden; }
    .slides {
      display: flex;
      transition: transform 0.6s ease;
    }
    .slide { min-width: 100%; }

    .dot {
      width: 10px;
      height: 10px;
      background: #64748b;
      border-radius: 50%;
      cursor: pointer;
    }
    .dot.active { background: #3b82f6; }
  </style>
</head>

<body class="text-white">

<div class="bg-animated"></div>

<div class="max-w-5xl mx-auto px-6 py-10">

  <a href="index.html" class="text-blue-400 hover:underline">← Back</a>

  <div class="mt-6 mb-10">
    <h1 class="text-4xl font-bold mb-3">Flappy Ball</h1>
    <p class="text-gray-400 max-w-xl">
      Game lấy cảm hứng từ Flappy Bird, phát triển bằng JavaScript, HTML và CSS.
    </p>
    <div class="flex gap-3 mt-4">
      <span class="px-3 py-1 bg-blue-500/20 rounded-full text-sm">JavaScript</span>
      <span class="px-3 py-1 bg-blue-500/20 rounded-full text-sm">HTML</span>
      <span class="px-3 py-1 bg-blue-500/20 rounded-full text-sm">CSS</span>
    </div>

    <a href="https://thpbmt.github.io/Flappy-Ball/"
       target="_blank"
       class="inline-block mt-6 px-5 py-2 bg-blue-500 rounded-lg hover:bg-blue-600 transition">
       Play 
    </a>
  </div>
  <div class="grid md:grid-cols-2 gap-8 mb-12">

    <div>
      <h2 class="text-xl font-semibold mb-3">Project Details</h2>
      <ul class="space-y-2 text-gray-300">
        <li>• Game 2D đơn giản</li>
        <li>• Cơ chế bay & trọng lực</li>
        <li>• Collision detection</li>
        <li>• Score system</li>
      </ul>
    </div>



  </div>
  <div>

    <div class="slider rounded-xl">
      <div class="slides" id="slides">
        <img src="images/game1.png" class="slide rounded-xl">
        <img src="images/game2.png" class="slide rounded-xl">
        <img src="images/game3.png" class="slide rounded-xl">
        <img src="images/game4.png" class="slide rounded-xl">
      </div>
    </div>

    <div id="dots" class="flex justify-center gap-3 mt-4"></div>
  </div>

</div>

<script>
  const slides = document.getElementById("slides");
  const slideItems = document.querySelectorAll(".slide");
  const dotsContainer = document.getElementById("dots");

  let index = 0;

  slideItems.forEach((_, i) => {
    const dot = document.createElement("div");
    dot.className = "dot";
    if (i === 0) dot.classList.add("active");

    dot.addEventListener("click", () => showSlide(i));
    dotsContainer.appendChild(dot);
  });

  const dots = document.querySelectorAll(".dot");

  function showSlide(i) {
    index = i;
    slides.style.transform = `translateX(-${i * 100}%)`;

    dots.forEach(dot => dot.classList.remove("active"));
    dots[i].classList.add("active");
  }

  setInterval(() => {
    index = (index + 1) % slideItems.length;
    showSlide(index);
  }, 3000);
</script>

</body>
</html>
